<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background matching GitHub -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#79c0ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="300" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#30363d" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="300" fill="url(#grid)" opacity="0.3"/>
  
  <!-- Top accent line -->
  <rect width="1200" height="3" fill="url(#accent)"/>
  
  <!-- Main title: vuln-monkey -->
  <text x="100" y="120" font-family="'Monaco', 'Menlo', 'Ubuntu Mono', monospace" font-size="72" font-weight="bold" fill="#58a6ff">
    vuln-monkey
  </text>
  
  <!-- Tagline -->
  <text x="100" y="165" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="24" fill="#8b949e" font-weight="300">
    AI-powered API security fuzzer
  </text>
  
  <!-- Terminal-style demo box -->
  <g transform="translate(750, 60)">
    <!-- Terminal window frame -->
    <rect width="400" height="200" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <rect width="400" height="28" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    
    <!-- Traffic lights -->
    <circle cx="18" cy="14" r="3" fill="#ec6b56"/>
    <circle cx="38" cy="14" r="3" fill="#fcc02e"/>
    <circle cx="58" cy="14" r="3" fill="#5fc038"/>
    
    <!-- Title bar -->
    <text x="90" y="19" font-family="'Monaco', 'Menlo', monospace" font-size="11" fill="#6e7681">
      $ vuln-monkey curl https://api.example.com/users
    </text>
    
    <!-- Terminal content -->
    <g transform="translate(12, 45)">
      <text x="0" y="0" font-family="'Monaco', 'Menlo', monospace" font-size="12" fill="#79c0ff">
        ✔ Parsed 1 endpoint
      </text>
      <text x="0" y="22" font-family="'Monaco', 'Menlo', monospace" font-size="12" fill="#79c0ff">
        ✔ Found 7 vulnerabilities
      </text>
      <text x="0" y="44" font-family="'Monaco', 'Menlo', monospace" font-size="12" fill="#79c0ff">
        ✔ Generated 56 payloads
      </text>
      <text x="0" y="66" font-family="'Monaco', 'Menlo', monospace" font-size="12" fill="#79c0ff">
        ✔ Risk score: 72/100
      </text>
      <text x="0" y="88" font-family="'Monaco', 'Menlo', monospace" font-size="12" fill="#f85149">
        → 3 critical findings
      </text>
      <text x="0" y="110" font-family="'Monaco', 'Menlo', monospace" font-size="12" fill="#a5d6ff">
        Reports saved to ./reports/
      </text>
    </g>
  </g>
  
  <!-- Bottom accent line -->
  <rect y="297" width="1200" height="3" fill="url(#accent)"/>
</svg>
