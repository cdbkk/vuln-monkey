    <line x1="180" y1="0" x2="180" y2="300"/><line x1="210" y1="0" x2="210" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/><line x1="270" y1="0" x2="270" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/><line x1="330" y1="0" x2="330" y2="300"/>
    <line x1="360" y1="0" x2="360" y2="300"/><line x1="390" y1="0" x2="390" y2="300"/>
    <line x1="420" y1="0" x2="420" y2="300"/><line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="480" y1="0" x2="480" y2="300"/><line x1="510" y1="0" x2="510" y2="300"/>
    <line x1="540" y1="0" x2="540" y2="300"/><line x1="570" y1="0" x2="570" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/><line x1="630" y1="0" x2="630" y2="300"/>
    <line x1="660" y1="0" x2="660" y2="300"/><line x1="690" y1="0" x2="690" y2="300"/>
    <line x1="720" y1="0" x2="720" y2="300"/><line x1="750" y1="0" x2="750" y2="300"/>
    <line x1="780" y1="0" x2="780" y2="300"/><line x1="810" y1="0" x2="810" y2="300"/>
    <line x1="840" y1="0" x2="840" y2="300"/><line x1="870" y1="0" x2="870" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/>
    <line x1="0" y1="0" x2="900" y2="0"/><line x1="0" y1="30" x2="900" y2="30"/>
    <line x1="0" y1="60" x2="900" y2="60"/><line x1="0" y1="90" x2="900" y2="90"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="180" x2="900" y2="180"/><line x1="0" y1="210" x2="900" y2="210"/>
    <line x1="0" y1="240" x2="900" y2="240"/><line x1="0" y1="270" x2="900" y2="270"/>
