  <!-- Monkey icon -->
  <text x="310" y="135" font-family="monospace" font-size="72" fill="url(#accent)" filter="url(#glow)">🐒</text>
  <!-- Title -->
  <text x="380" y="125" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-weight="800" font-size="52" fill="#ffffff" letter-spacing="-1">vuln-monkey</text>
  <!-- Tagline -->
  <text x="310" y="170" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="16" fill="#888888">AI-powered API security fuzzer</text>
  <!-- Terminal preview -->
  <g transform="translate(200, 195)">
    <rect width="500" height="80" rx="6" fill="#1e1e2e" stroke="#333" stroke-width="1"/>
    <circle cx="16" cy="12" r="4" fill="#ff5f56"/><circle cx="30" cy="12" r="4" fill="#ffbd2e"/><circle cx="44" cy="12" r="4" fill="#27c93f"/>
    <text x="16" y="38" font-family="ui-monospace, 'Cascadia Code', monospace" font-size="12" fill="#6c6c8a">$</text>
    <text x="28" y="38" font-family="ui-monospace, 'Cascadia Code', monospace" font-size="12" fill="#cdd6f4"> vuln-monkey "curl https://api.example.com/users"</text>
    <text x="16" y="56" font-family="ui-monospace, 'Cascadia Code', monospace" font-size="11" fill="#f38ba8">  CRITICAL </text>
    <text x="100" y="56" font-family="ui-monospace, 'Cascadia Code', monospace" font-size="11" fill="#a6adc8">IDOR - Access another user's data</text>
    <text x="16" y="70" font-family="ui-monospace, 'Cascadia Code', monospace" font-size="11" fill="#fab387">  HIGH     </text>
    <text x="100" y="70" font-family="ui-monospace, 'Cascadia Code', monospace" font-size="11" fill="#a6adc8">Auth bypass - Missing token validation</text>
  </g>
